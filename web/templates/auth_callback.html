<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificando cuenta...</title>
    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .msg { text-align: center; }
        .msg p { opacity: 0.6; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="msg">
        <strong>Verificando tu cuenta...</strong>
        <p id="status">Un momento por favor.</p>
    </div>
    <script>
        (function () {
            var hash = window.location.hash.substring(1);
            var params = new URLSearchParams(hash);
            var accessToken = params.get('access_token');
            var errorDesc = params.get('error_description');

            if (errorDesc) {
                document.getElementById('status').textContent = errorDesc;
                setTimeout(function () {
                    window.location.href = '/login';
                }, 3000);
                return;
            }

            if (!accessToken) {
                window.location.href = '/login';
                return;
            }

            fetch('/api/auth/exchange-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_token: accessToken }),
            })
            .then(function (res) {
                return res.json().then(function (data) {
                    if (!res.ok) {
                        document.getElementById('status').textContent =
                            data.error || 'Error al verificar la cuenta.';
                        setTimeout(function () { window.location.href = '/login'; }, 3000);
                    } else {
                        window.location.href = data.redirect || '/';
                    }
                });
            })
            .catch(function () {
                window.location.href = '/login';
            });
        })();
    </script>
</body>
</html>
