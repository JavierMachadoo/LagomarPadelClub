<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Lagomar Padel Club</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-black: #0a0a0a;
            --brand-green: #22c55e;
            --brand-green-dark: #16a34a;
            --brand-green-glow: rgba(34, 197, 94, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--brand-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }

        /* ── Botón volver al inicio ── */
        .btn-inicio {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 10;
        }
        .btn-inicio:hover { color: var(--brand-green); }

        /* ── Card ── */
        .login-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.7), 0 0 0 1px rgba(34,197,94,0.05);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.45s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .login-header {
            background: var(--brand-black);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(34,197,94,0.15);
            position: relative;
        }

        .login-header::after {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand-green), transparent);
            position: absolute;
            bottom: 0; left: 0; right: 0;
        }

        .login-header img {
            width: 180px;
            height: auto;
            display: block;
            margin: 0 auto 0.75rem;
        }

        .login-header p {
            color: rgba(255,255,255,0.45);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin: 0;
        }

        /* ── Body ── */
        .login-body { padding: 2rem; }

        .form-label {
            font-weight: 600;
            color: rgba(255,255,255,0.75);
            font-size: 0.875rem;
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: #1e1e1e;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .form-control:focus {
            background: #1e1e1e;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px var(--brand-green-glow);
            color: #fff;
            outline: none;
        }

        .input-group-text {
            background: #1e1e1e;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: var(--brand-green);
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--brand-green);
        }

        /* ── Botón principal ── */
        .btn-login {
            background: var(--brand-green);
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            color: var(--brand-black);
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            letter-spacing: 0.03em;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .btn-login:hover:not(:disabled) {
            background: var(--brand-green-dark);
            box-shadow: 0 6px 20px var(--brand-green-glow);
            transform: translateY(-1px);
        }
        .btn-login:disabled { opacity: 0.6; }

        /* ── Alert ── */
        .alert {
            border-radius: 10px;
            border: none;
            font-size: 0.9rem;
        }

        /* ── Link registro ── */
        .link-registro {
            color: var(--brand-green);
            font-weight: 600;
            text-decoration: none;
        }
        .link-registro:hover { color: var(--brand-green-dark); text-decoration: underline; }

        .divider {
            border-color: rgba(255,255,255,0.08);
            margin: 1.25rem 0;
        }
    </style>
</head>
<body>

    <!-- Volver al inicio -->
    <a href="/" class="btn-inicio">
        <i class="bi bi-arrow-left"></i> Inicio
    </a>

    <div class="login-card">
        <!-- Header con logo -->
        <div class="login-header">
            <img src="{{ url_for('static', filename='img/logo_lagomar.png') }}"
                 alt="Lagomar Padel Club">
            <p>Torneos de Pádel</p>
        </div>

        <div class="login-body">
            <div id="msg-login" class="alert" style="display:none"></div>

            <form id="form-login">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="login-email"
                               placeholder="tu@email.com" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="login-password"
                               placeholder="Tu contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login" id="btn-login-submit">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>

            <hr class="divider">

            <div class="text-center">
                <small style="color: rgba(255,255,255,0.4);">
                    ¿No tienes cuenta?
                    <a href="/registro" class="link-registro">Regístrate</a>
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form  = document.getElementById('form-login');
        const btn   = document.getElementById('btn-login-submit');
        const msgEl = document.getElementById('msg-login');

        function mostrarMsg(texto, tipo) {
            msgEl.className = `alert alert-${tipo}`;
            msgEl.textContent = texto;
            msgEl.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';
            msgEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email:    document.getElementById('login-email').value.trim(),
                        password: document.getElementById('login-password').value,
                    }),
                });
                const json = await res.json();

                if (res.ok) {
                    window.location.href = json.redirect || '/grupos';
                } else {
                    mostrarMsg(json.error || 'Credenciales incorrectas', 'danger');
                }
            } catch {
                mostrarMsg('Error de red. Intenta de nuevo.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Ingresar';
            }
        });
    </script>
</body>
</html>
