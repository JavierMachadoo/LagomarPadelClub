<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Jugador - Torneo de Pádel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .registro-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 440px;
            width: 90%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .registro-header {
            background: #111111;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .registro-header i {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        .registro-body {
            padding: 2rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.25);
        }

        .input-group-text {
            background: white;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #22c55e;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .input-group:focus-within .input-group-text {
            border-color: #22c55e;
        }

        .btn-registro {
            background: #22c55e;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            color: #111111;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-registro:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
            background: #16a34a;
        }

        .btn-registro:disabled {
            opacity: 0.65;
            transform: none;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        #mensaje-resultado {
            display: none;
        }
    </style>
</head>
<body>
    <div class="registro-card">
        <div class="registro-header">
            <i class="bi bi-person-plus-fill text-success"></i>
            <h2 class="mb-0">Crear Cuenta</h2>
            <p class="mb-0 mt-1 opacity-75">Torneo de Pádel</p>
        </div>

        <div class="registro-body">
            <div id="mensaje-resultado" class="alert" role="alert"></div>

            <form id="form-registro">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label"><i class="bi bi-person me-1"></i>Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre"
                               placeholder="Juan" required autofocus>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="apellido" name="apellido"
                               placeholder="García" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-phone me-1"></i>Teléfono <span class="text-muted fw-normal">(opcional)</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-phone"></i></span>
                        <input type="tel" class="form-control" id="telefono" name="telefono"
                               placeholder="600 123 456">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-lock me-1"></i>Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn btn-registro" id="btn-submit">
                    <i class="bi bi-person-check me-2"></i>Crear cuenta
                </button>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted">
                    ¿Ya tienes cuenta?
                    <a href="/login" class="text-decoration-none fw-semibold" style="color: #22c55e;">Inicia sesión</a>
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form      = document.getElementById('form-registro');
        const btnSubmit = document.getElementById('btn-submit');
        const mensajeEl = document.getElementById('mensaje-resultado');

        function mostrarMensaje(texto, tipo) {
            mensajeEl.className = `alert alert-${tipo}`;
            mensajeEl.textContent = texto;
            mensajeEl.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';
            mensajeEl.style.display = 'none';

            const payload = {
                nombre:   document.getElementById('nombre').value.trim(),
                apellido: document.getElementById('apellido').value.trim(),
                email:    document.getElementById('email').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                password: document.getElementById('password').value,
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(payload),
                });
                const json = await res.json();

                if (res.ok) {
                    mostrarMensaje(json.message, 'success');
                    form.reset();
                } else {
                    mostrarMensaje(json.error || 'Error al registrar', 'danger');
                }
            } catch {
                mostrarMensaje('Error de red. Intenta de nuevo.', 'danger');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="bi bi-person-check me-2"></i>Crear cuenta';
            }
        });
    </script>
</body>
</html>
